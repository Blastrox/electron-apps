<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="card">
        <h1>Counter</h1>
        <p id="counter">0</p>
        <div class="buttons">
            <button id="decrement" onclick="subtract()">−</button>
            <button id="increment" onclick="add()">+</button>
            <button id="reset" onclick="reset()">Reset</button>
        </div>
    </div>

    <script>

        function updateDisplay(value) {
            const counter = document.getElementById("counter");
            counter.innerText = value;
            counter.classList.toggle("negative", value < 0);
        }

        async function add() {
            const value = await window.counter.add();
            updateDisplay(value);
        }

        function subtract() {
            const counter = document.getElementById("counter");
            updateDisplay(parseInt(counter.innerText) - 1);
        }

        function reset() {
            updateDisplay(0);
        }

    </script>
</body>

</html>
